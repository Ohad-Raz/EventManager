<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EventManager Logs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="spinner.css" />
    <link rel="stylesheet" href="logs.css" />
</head>
<body>
    <nav>
        <h2>Log list</h2>
        <ul>
            <li><a href="logs.html">Logs</a></li>
            <li><a href="javascript:void(0);" onclick="jwtLogout()">Logout</a></li>
        </ul>
    </nav>

    <div class="container mt-3">
        <div class="row m-3">
            <div class="col">
                <div id="total-count" class="total-count">Total logs: -</div>
            </div>
        </div>

        <div class="row m-3 align-items-center">
            <div class="col-auto">
                <label for="log-count" class="col-form-label">Show logs:</label>
            </div>
            <div class="col-auto">
                <select id="log-count" class="form-select">
                    <option value="10" selected>10</option>
                    <option value="25">25</option>
                    <option value="50">50</option>
                </select>
            </div>
            <div class="col-auto">
                <button id="refresh-button" class="btn btn-primary" onclick="loadLogs()">
                    Refresh
                    <span id="refresh-spinner-placeholder"></span>
                </button>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <div id="placeholder"></div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
            integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
            crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
            crossorigin="anonymous"></script>
    <script src="logs.js"></script>
</body>
</html>
